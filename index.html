<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bank System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Banking System</h1>

    <h3>Create Account</h3>
    <input id="accNo" type="number" placeholder="Account Number">
    <input id="name" placeholder="Account Name">
    <input id="balance" type="number" placeholder="Initial Balance">
    <button onclick="createAccount()">Create Account</button>

    <hr>

    <h3>Search Account</h3>
    <input id="searchAcc" type="number" placeholder="Enter Account Number">
    <button onclick="searchAccount()">Search</button>

    <h2 id="accountInfo">No Account Selected</h2>
    <h2 id="balanceDisplay"></h2>

    <div class="actions">
        <input id="amount" type="number" placeholder="Amount">
        <button onclick="deposit()">Deposit</button>
        <button onclick="withdraw()">Withdraw</button>
    </div>

    <h3>Transactions</h3>
    <ul id="history"></ul>

</div>

<script src="script.js"></script>
</body>
</html>
